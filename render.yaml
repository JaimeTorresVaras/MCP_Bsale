services:
  - type: web
    name: bsale-mcp
    runtime: docker
    plan: starter          # plan gratis disponible
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: PORT
        value: 8000
      - key: BSALE_API_TOKEN
        sync: false        # se ingresa manualmente en el dashboard de Render
    healthCheckPath: /health
